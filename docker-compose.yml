
services:

  db:
    image: postgres:15
    container_name: text2sql_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: text2sql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: text2sql_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db:5432/text2sql
      DATABASE_READONLY_URL: postgresql+psycopg://text2sql_readonly:readonly123@db:5432/text2sql
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m db.seed && python -m uvicorn api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./text2sql-ui
      dockerfile: Dockerfile
    container_name: text2sql_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data: